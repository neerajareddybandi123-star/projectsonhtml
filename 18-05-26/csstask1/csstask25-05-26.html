
<!DOCTYPE html>
<html>
<head>
    <title>Place an Order</title>

    <style>
        body{
            background-color:#dcdcdc;
            font-family:Georgia, serif;
        }

        .container{
            width:750px;
            background-color:#2b5605;
            margin:40px auto;
            padding:30px;
            border:12px solid white;
            
        }

        h1{
            text-align:center;
            font-size:65px;
            color:#6b5b4b;
            font-style:italic;
            margin-bottom:20px;
            margin-top:10px;
        }

        .form-box{
            background-color:white;
            padding:30px 50px;
            border-radius:10px;
        }

        h2{
            font-size:55px;
            color:#6b5b4b;
            font-style:italic;
            margin-bottom:35px;
        }

        .form-group{
            margin-bottom:25px;
        }

        label{
            display:inline-block;
            width:220px;
            font-size:22px;
            font-weight:bold;
            color:#4b3d33;
        }

        input,select{
            width:260px;
            padding:8px;
            font-size:18px;
            border:1px solid #cccccc;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>Place an Order</h1>

        <div class="form-box">

            <h2> Billing Address</h2>

            <div class="form-group">
                <label>First name</label>
                <input type="text" name="fristname" id="fristname">
            </div>

            <div class="form-group">
                <label>Last name</label>
                <input type="text" name="lastname" id="lastname">
            </div>

            <div class="form-group">
                <label>Street Address</label>
                <input type="text" id="adddress" name="address">
            </div>

            <div class="form-group">
                <label>City</label>
                <input type="text" id="city" name="city">
            </div>

            <div class="form-group">
                <label>State</label>

                <select>
                     <option>AL</option>
                    <option>Ap</option>
                    <option>TG</option>
                    <option>Kerala</option>
                </select>
            </div>
          

        </div>

    </div>

</body>
</html>
